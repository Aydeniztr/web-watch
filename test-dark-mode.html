<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Test - Web Watch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-white dark:bg-slate-950 text-gray-900 dark:text-white transition-colors duration-300">
    <div class="min-h-screen flex flex-col items-center justify-center gap-8 p-4">
        <h1 class="text-4xl font-bold">🌙 Dark Mode Test</h1>
        
        <button 
            id="dark-mode-toggle" 
            class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 text-gray-900 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors"
            title="Toggle dark mode"
        >
            <i class="fas fa-sun dark:hidden"></i>
            <i class="fas fa-moon hidden dark:inline"></i>
        </button>
        
        <div class="max-w-2xl text-center space-y-4">
            <p class="text-lg">Click the button above to toggle dark mode</p>
            <div class="p-6 bg-gray-100 dark:bg-slate-800 rounded-lg border border-gray-200 dark:border-slate-700">
                <h2 class="text-2xl font-bold mb-2">Box Test</h2>
                <p>This box should change colors when you toggle dark mode.</p>
                <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">
                    Light: gray background | Dark: slate background
                </p>
            </div>
        </div>
        
        <div id="status" class="p-4 bg-blue-100 dark:bg-blue-900 rounded-lg font-mono text-sm max-w-md">
            <p>Status: Ready</p>
            <p>Dark mode: <span id="dark-status">OFF</span></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
    <script>
        const toggle = document.getElementById('dark-mode-toggle');
        const html = document.documentElement;
        const darkStatus = document.getElementById('dark-status');

        // Check if dark mode is enabled
        function updateStatus() {
            darkStatus.textContent = html.classList.contains('dark') ? 'ON' : 'OFF';
        }

        // Toggle dark mode
        toggle.addEventListener('click', function() {
            console.log('Toggle clicked!');
            html.classList.toggle('dark');
            localStorage.setItem('dark-mode', html.classList.contains('dark') ? 'true' : 'false');
            updateStatus();
            console.log('Dark mode is now:', html.classList.contains('dark'));
        });

        // Initial status
        updateStatus();
        console.log('Dark mode test page loaded');
    </script>
</body>
</html>
